services:

  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - postgres
      - auth-service
      - user-service
      - order-service
    environment:
      - PORT=5000
    env_file:
      - ./api-gateway/.env
    restart: always

  # Auth Service
  auth-service:
    build: ./auth-service
    ports:
      - "5003:5003"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./auth-service/.env
    restart: on-failure

  # User Service
  user-service:
    build: ./user-service
    ports:
      - "5001:5001"
    depends_on:
      - postgres
      - postgres-init
    env_file:
      - ./user-service/.env
    restart: on-failure

  # Order Service
  order-service:
    build: ./order-service
    ports:
      - "5002:5002"
    depends_on:
      - postgres
      - postgres-init
    env_file:
      - ./order-service/.env
    restart: on-failure

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aegis_auth
    ports:
      - "5432:5432"

# Initialize additional databases
  postgres-init:
    image: postgres:15
    depends_on:
      - postgres
    environment:
      PGPASSWORD: password
    entrypoint: >
      sh -c "
        until pg_isready -h postgres -U postgres; do sleep 1; done;
        psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'aegis_users'\" | grep -q 1 || psql -h postgres -U postgres -c 'CREATE DATABASE aegis_users';
        psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'aegis_orders'\" | grep -q 1 || psql -h postgres -U postgres -c 'CREATE DATABASE aegis_orders';
      "
    restart: "no"

  # Redis
  redis:
    image: redis:7
    container_name: aegis-redis
    ports:
      - "6379:6379"

  # Prometheus
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus